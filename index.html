<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ElectroHub - Electronics Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;

/* Professional soft gradient background */
background:
linear-gradient(180deg,#f8fafc 0%,#eef2f7 100%);

min-height:100vh;
scroll-behavior:smooth;}
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:
radial-gradient(circle at 1px 1px, rgba(0,0,0,0.04) 1px, transparent 0);

background-size:24px 24px;

pointer-events:none;
z-index:-1;
}


.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

header{
transition:all .3s;
}

header.shrink{
padding:.3rem 0;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.hero{
background:
linear-gradient(135deg,rgba(13,110,253,0.85),rgba(0,0,0,0.6)),
url('images/p1.png');

background-size:cover;
background-position:center;

height:70vh;
display:flex;
align-items:center;
color:white;
}
.card{
border:none;
border-radius:16px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(6px);
transition:all .3s ease;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 12px 30px rgba(0,0,0,0.12);
}
.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,.1);
}

.product-img{
height:200px;
object-fit:cover;
}

.rating i{
color:#ffc107;
}

.backtop{
position:fixed;
bottom:30px;
right:30px;
display:none;
}

footer{
background:#111;
color:#bbb;
}

</style>
</head>

<body>

<div class="loader">
<div class="spinner-border text-primary"></div>
</div>

<header class="bg-white sticky-top py-2">
<div class="container d-flex align-items-center justify-content-between">

<h4 class="fw-bold m-0">ElectroHub</h4>

<input id="searchInput" class="form-control w-50" placeholder="Search electronics...">

<div>
<button class="btn position-relative" data-bs-toggle="offcanvas" data-bs-target="#cartCanvas">
<i class="bi bi-cart fs-4"></i>
<span id="cartCount" class="badge bg-danger position-absolute top-0 start-100 translate-middle">0</span>
</button>
<i class="bi bi-person fs-4 ms-3"></i>
<i class="bi bi-question-circle fs-4 ms-3"></i>
</div>

</div>
</header>

<section class="hero text-center">
<div class="container">
<h1 class="display-4 fw-bold">Next-Gen Electronics</h1>
<p>Discover the latest gadgets at unbeatable prices</p>
<a href="#products" class="btn btn-primary btn-lg">Shop Now</a>
</div>
</section>

<main>

<section id="products" class="py-5">
<div class="container">

<div class="row mb-3">

<div class="col-md-6">

<div class="form-check form-check-inline">
<input class="form-check-input category-filter" type="checkbox" value="Smartphones">
<label class="form-check-label">Smartphones</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input category-filter" type="checkbox" value="Laptops">
<label class="form-check-label">Laptops</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input category-filter" type="checkbox" value="Audio">
<label class="form-check-label">Audio</label>
</div>

</div>

<div class="col-md-3 ms-auto">
<select id="sortPrice" class="form-select">
<option value="">Sort</option>
<option value="low">Price Low → High</option>
<option value="high">Price High → Low</option>
</select>
</div>

</div>

<div id="productGrid" class="row g-4"></div>

</div>
</section>

<section id="checkout" class="py-5 bg-light">
<div class="container">

<h2 class="mb-4">Checkout</h2>

<div class="row">

<div class="col-md-6">

<form id="checkoutForm">

<input required class="form-control mb-2" placeholder="Full Name">
<input required type="email" class="form-control mb-2" placeholder="Email">
<input required class="form-control mb-2" placeholder="Phone">

<input required class="form-control mb-2" placeholder="Address">
<input required class="form-control mb-2" placeholder="City">
<input required class="form-control mb-2" placeholder="State">
<input required class="form-control mb-2" placeholder="ZIP">

<select class="form-select mb-3">
<option>Credit Card</option>
<option>UPI</option>
<option>PayPal</option>
</select>

<button class="btn btn-primary w-100">Place Order</button>

</form>

</div>

<div class="col-md-6">

<h5>Order Summary</h5>
<ul id="checkoutSummary" class="list-group"></ul>

</div>

</div>

</div>
</section>

<section class="py-5">
<div class="container text-center">
<h2>About ElectroHub</h2>
<p>Premium electronics with warranty, fast shipping and 24/7 support.</p>
</div>
</section>

<section class="py-5 bg-light">
<div class="container">

<h2>Contact</h2>

<form id="contactForm">
<input required class="form-control mb-2" placeholder="Name">
<input required type="email" class="form-control mb-2" placeholder="Email">
<textarea required class="form-control mb-2" placeholder="Message"></textarea>
<button class="btn btn-primary">Send</button>
</form>

</div>
</section>

</main>

<footer class="py-4 text-center">
<p>© 2026 ElectroHub</p>
</footer>

<button class="btn btn-primary backtop"><i class="bi bi-arrow-up"></i></button>

<div class="offcanvas offcanvas-end" id="cartCanvas">
<div class="offcanvas-header">
<h5>Shopping Cart</h5>
<button class="btn-close" data-bs-dismiss="offcanvas"></button>
</div>
<div class="offcanvas-body">

<ul id="cartItems" class="list-group mb-3"></ul>

<h5 id="cartTotal"></h5>

<a href="#checkout" class="btn btn-success w-100" data-bs-dismiss="offcanvas">Checkout</a>

</div>
</div>

<div class="modal fade" id="productModal">
<div class="modal-dialog modal-lg">
<div class="modal-content">
<div class="modal-body" id="modalContent"></div>
</div>
</div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const products=[

{
id:'p1',
name:'iPhone 15',
category:'Smartphones',
price:999,
rating:4.7,
img: 'images/p2.png'
},

{
id:'p2',
name:'Samsung Galaxy S24',
category:'Smartphones',
price:899,
rating:4.6,
img:'https://images.unsplash.com/photo-1598327105666-5b89351aff97?w=600'
},

{
id:'p3',
name:'MacBook Air M3',
category:'Laptops',
price:1299,
rating:4.9,
img:'https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=600'
},

{
id:'p4',
name:'Dell XPS 13',
category:'Laptops',
price:1199,
rating:4.5,
img:'https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=600'
},

{
id:'p5',
name:'Sony WH-1000XM5',
category:'Audio',
price:349,
rating:4.8,
img:'images/p3.png'
},

{
id:'p6',
name:'AirPods Pro',
category:'Audio',
price:249,
rating:4.7,
img:'images/p4.png'
},

{
id:'p7',
name:'Apple Watch Series 9',
category:'Wearables',
price:399,
rating:4.6,
img:'https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=600'
},

{
id:'p8',
name:'RTX Gaming Laptop',
category:'Laptops',
price:1599,
rating:4.7,
img:'https://images.unsplash.com/photo-1603302576837-37561b2e2302?w=600'
},

{
id:'p9',
name:'4K Smart TV',
category:'TVs',
price:799,
rating:4.5,
img:'https://images.unsplash.com/photo-1593784991095-a205069470b6?w=600'
},

{
id:'p10',
name:'Bluetooth Speaker',
category:'Audio',
price:149,
rating:4.3,
img:'https://images.unsplash.com/photo-1589003077984-894e133dabab?w=600'
},

{
id:'p11',
name:'Mechanical Keyboard',
category:'Accessories',
price:129,
rating:4.4,
img:'https://images.unsplash.com/photo-1618384887929-16ec33fab9ef?w=600'
},

{
id:'p12',
name:'Gaming Mouse',
category:'Accessories',
price:79,
rating:4.4,
img:'images/p5.png'
}

]

let cart=JSON.parse(localStorage.getItem("cart"))||{}

function renderProducts(list){

$('#productGrid').html(list.map(p=>`

<div class="col-md-3">

<div class="card h-100">

<img src="${p.img}" class="card-img-top product-img" loading="lazy">

<div class="card-body d-flex flex-column">

<h6>${p.name}</h6>

<div class="rating">${'★'.repeat(Math.round(p.rating))}</div>

<p>$${p.price}</p>

<div class="mt-auto">

<button class="btn btn-sm btn-primary addCart" data-id="${p.id}">Add</button>

<button class="btn btn-sm btn-outline-secondary viewDetail" data-id="${p.id}">Details</button>

</div>

</div>

</div>

</div>

`).join(''))

}

function updateCart(){

let total=0
let count=0
let html=''

Object.keys(cart).forEach(id=>{
let p=products.find(x=>x.id==id)
let qty=cart[id]

total+=p.price*qty
count+=qty

html+=`
<li class="list-group-item d-flex justify-content-between">
${p.name} x${qty}
<span>$${p.price*qty}</span>
</li>`
})

$('#cartItems').html(html)
$('#cartTotal').text("Total: $"+total.toFixed(2))
$('#cartCount').text(count)

localStorage.setItem("cart",JSON.stringify(cart))

updateCheckout()

}

function updateCheckout(){

let html=''
let total=0

Object.keys(cart).forEach(id=>{
let p=products.find(x=>x.id==id)
let qty=cart[id]

total+=p.price*qty

html+=`<li class="list-group-item d-flex justify-content-between">
${p.name} x${qty}
<span>$${p.price*qty}</span>
</li>`
})

html+=`<li class="list-group-item fw-bold d-flex justify-content-between">
Total<span>$${total}</span></li>`

$('#checkoutSummary').html(html)

}

$(document).on("click",".addCart",function(){

let id=$(this).data("id")
cart[id]=(cart[id]||0)+1
updateCart()

})

$(document).on("click",".viewDetail",function(){

let id=$(this).data("id")
let p=products.find(x=>x.id==id)

$('#modalContent').html(`
<h3>${p.name}</h3>
<img src="${p.img}" class="img-fluid mb-3">
<p>Rating ${p.rating}</p>
<p>$${p.price}</p>
<button class="btn btn-primary addCart" data-id="${p.id}">Add to Cart</button>
`)

new bootstrap.Modal('#productModal').show()

})

$('#searchInput').on("input",function(){

let q=$(this).val().toLowerCase()

let filtered=products.filter(p=>p.name.toLowerCase().includes(q))

renderProducts(filtered)

})

$('#sortPrice').change(function(){

let val=$(this).val()

let list=[...products]

if(val=="low")list.sort((a,b)=>a.price-b.price)
if(val=="high")list.sort((a,b)=>b.price-a.price)

renderProducts(list)

})

$('#checkoutForm').submit(function(e){

e.preventDefault()

alert("Order placed! ID: EH-"+Math.floor(Math.random()*100000))

cart={}
updateCart()

})

$('#contactForm').submit(function(e){

e.preventDefault()
alert("Message sent (demo).")

})

$(window).scroll(function(){

if($(this).scrollTop()>200){
$('.backtop').fadeIn()
$('header').addClass('shrink')
}else{
$('.backtop').fadeOut()
$('header').removeClass('shrink')
}

})

$('.backtop').click(()=>window.scrollTo({top:0,behavior:'smooth'}))

renderProducts(products)
updateCart()

setTimeout(()=>$('.loader').fadeOut(),700)

</script>

</body>
</html>
